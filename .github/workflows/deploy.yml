name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-apps-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate clasp
        env:
          CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}
        run: echo "$CLASP_CREDENTIALS" > ~/.clasprc.json

      - name: Push to Apps Script
        working-directory: appscript
        run: clasp push --force

      - name: Update deployment
        working-directory: appscript
        env:
          DEPLOYMENT_ID: ${{ secrets.VITE_APPS_SCRIPT_DEPLOYMENT }}
        run: clasp deploy -i "$DEPLOYMENT_ID"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: geosef/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: geosef

      - name: Build
        run: npm run build
        working-directory: geosef
        env:
          VITE_APPS_SCRIPT_DEPLOYMENT: ${{ secrets.VITE_APPS_SCRIPT_DEPLOYMENT }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: geosef/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
