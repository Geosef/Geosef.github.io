<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Joe Carroll</title>
    <script>
      // SPA redirect: encode the path into the query string so index.html can restore it
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
